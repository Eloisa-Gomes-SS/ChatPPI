<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chat1.css">
    <script src="chat1.js" defer></script>
    <title>Tanto faz</title>
</head>
<body>
    <header>
        <h1>Tanto faz</h1>
        <img src="Logo.webp" alt="Logo">
    </header>
    <section>
        <!-- mensagens previas: -->
        <article>
            <p>Bom dia.</p>
        </article>
        <article>
            <!-- mensagem do usuario (lado direito da tela e cor de fundo diferente) -->
            <p>Boa tarde.</p>
        </article>
        <article>
            <p>Boa noite!</p>
        </article>
        <!-- fim das mensagens previas -->
        <article id="msgsU">
            <!-- mensagens usuario -->
        </article>
        <div>
            <!-- coloca isso (a div) pro final (baixo) da section -->
            <textarea name="Mensagem" id="msgU" placeholder="O que pensas?"></textarea>
            <!-- torne a textarea de tamanho fixo -->
            <input type="submit" id="send" value="↑">
        </div>
    </section>
    <footer>
        <img src="Instituto_Federal.png" alt="IFRN">
        <p>IFRN campus Santa Cruz<br>
        Trabalho de Programação para Internet<br>
        Prof. Marcelo Figueiredo Barbosa Júnior<br>
        Feito com Visual Studio Code<br>
        Discentes:<br>
        Ana Caroline Lima de Medeiros<br>
        Hemilly Barbosa Gomes<br>
        Maria Rita Palma de Araújo</p>
    </footer>
</body>
</html>
